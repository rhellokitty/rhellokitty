<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Muhammad Raja Daffa Profile Banner</title>
  <desc id="desc">Premium glass-inspired static fallback banner in navy, blue, cyan, and teal with the name Muhammad Raja Daffa and the subtitle Full Stack Developer, SaaS Builder, Cybersecurity Enthusiast.</desc>
  <defs>
    <linearGradient id="bg" x1="76" y1="24" x2="1110" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07101F"/>
      <stop offset="0.48" stop-color="#0B2243"/>
      <stop offset="1" stop-color="#0C4F5C"/>
    </linearGradient>
    <linearGradient id="panel" x1="104" y1="64" x2="744" y2="258" gradientUnits="userSpaceOnUse">
